name: Multi-Agent Workflow Validation

on:
  pull_request:
    branches: [ develop, main ]
    types: [ opened, synchronize, reopened ]
  
  push:
    branches: [ develop, main ]

jobs:
  # ==========================================
  # AGENT-DEVELOPER VALIDATION
  # ==========================================
  developer-checks:
    name: Developer Pre-submission
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Remove old lock file and install
      working-directory: frontend
      run: |
        rm -f package-lock.json
        npm install

    - name: TypeScript compilation
      working-directory: frontend
      run: npx tsc --noEmit
      continue-on-error: true
      
    - name: Lint check
      working-directory: frontend
      run: npm run lint
    
    - name: Build verification
      working-directory: frontend
      run: npm run build
    
    - name: Check for console.logs
      working-directory: frontend/src
      run: |
        if grep -r "console.log" --include="*.ts" --include="*.tsx" .; then
          echo "⚠️  Warning: Found console.log statements. Please remove before submission."
          exit 1
        fi
        echo "✅ No console.log statements found"
    
    - name: Check for TODO/FIXME comments
      working-directory: frontend/src
      run: |
        TODO_COUNT=$(grep -r "TODO\|FIXME" --include="*.ts" --include="*.tsx" -c . || echo "0")
        if [ "$TODO_COUNT" -gt 0 ]; then
          echo "⚠️  Found $TODO_COUNT TODO/FIXME comments:"
          grep -r "TODO\|FIXME" --include="*.ts" --include="*.tsx" -n .
          echo ""
          echo "Please address or document these before submission."
        fi

  # ==========================================
  # AGENT- RELEASER (PRODUCTION DEPLOY)
  # ==========================================
  releaser-checks:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: [developer-checks, tester-checks, integrator-checks]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Remove old lock file and install
      working-directory: frontend
      run: |
        rm -f package-lock.json
        npm install

    - name: Build for production
      working-directory: frontend
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    
    - name: Deploy to Production
      uses: amondnet/vercel-action@v25
      if: github.event.pull_request.head.repo.full_name == github.repository
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
    
    - name: Comment PR with preview URL
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          github.rest.issues.createComment({
            issue_number: prNumber,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **Preview deployment ready!**
            
            All checks passed. Ready for final review.
            
            **Next steps:**
            1. Reviewer approves PR
            2. Integrator merges to develop
            3. Feature will be deployed to staging`
          });

  # ==========================================
  # FINAL VALIDATION
  # ==========================================
  final-validation:
    name: Final Validation
    runs-on: ubuntu-latest
    needs: [developer-checks, tester-checks, reviewer-checks]
    if: always()
    
    steps:
    - name: Summary
      run: |
        echo "=========================================="
        echo "  MULTI-AGENT WORKFLOW VALIDATION"
        echo "=========================================="
        echo ""
        echo "✅ Developer Checks:     ${{ needs.developer-checks.result }}"
        echo "✅ Tester Checks:        ${{ needs.tester-checks.result }}"
        echo "✅ Reviewer Checks:      ${{ needs.reviewer-checks.result }}"
        echo ""
        echo "=========================================="
        
        if [ "${{ needs.developer-checks.result }}" = "success" ] && \
           [ "${{ needs.tester-checks.result }}" = "success" ] && \
           [ "${{ needs.reviewer-checks.result }}" = "success" ]; then
          echo "✅ ALL CHECKS PASSED"
          echo "Ready for AGENT-INTEGRATOR"
        else
          echo "❌ SOME CHECKS FAILED"
          echo "Please fix issues and try again"
          exit 1
        fi

  # ==========================================
  # PRODUCTION DEPLOY (on main branch)
  # ==========================================
  production-deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: [developer-checks, tester-checks, reviewer-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Remove old lock file and install
      working-directory: frontend
      run: |
        rm -f package-lock.json
        npm install

    - name: Build for production
      working-directory: frontend
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    
    - name: Deploy to Production
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        vercel-args: '--prod'
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        body: |
          ## Release ${{ github.run_number }}
          
          ### Features
          - See commits for details
          
          ### Validation
          - ✅ All tests passing
          - ✅ Code reviewed
          - ✅ Build successful
          
          ### Deployed to
          - Production: [URL]
        draft: false
        prerelease: false
